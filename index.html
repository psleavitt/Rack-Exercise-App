<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rack — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=JetBrains+Mono:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#EDEAE1;
    --surface:#DCD5C4;
    --surface-deep:#CDC4AE;
    --ink:#211F1B;
    --ink-soft:#5B5650;
    --ink-faint:#8A8479;
    --red:#B8392C;
    --red-deep:#8E2A20;
    --blue:#2B5980;
    --blue-deep:#1E4262;
    --gold:#A07A1F;
    --line: rgba(33,31,27,0.14);
    --line-strong: rgba(33,31,27,0.26);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(circle at 10% 0%, rgba(33,31,27,0.035), transparent 40%),
      var(--bg);
  }
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:baseline; justify-content:space-between;
    padding:18px 18px 12px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:34px;
    letter-spacing:0.5px;
    margin:0;
    line-height:1;
  }
  .brand small{
    display:block;
    font-family:'Work Sans', sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:2px;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin-top:2px;
  }
  .iconbtn{
    background:none; border:none; cursor:pointer;
    font-size:20px; color:var(--ink-soft);
    padding:6px; line-height:1;
  }
  main{ flex:1; padding:16px 16px 100px; }
  .bottomnav{
    position:fixed; bottom:0; left:0; right:0;
    max-width:480px; margin:0 auto;
    display:flex;
    background:var(--ink);
    border-top:1px solid rgba(0,0,0,0.2);
    z-index:30;
  }
  .navbtn{
    flex:1; padding:14px 0 calc(14px + env(safe-area-inset-bottom,0px));
    background:none; border:none; cursor:pointer;
    color:rgba(244,242,235,0.55);
    font-family:'Work Sans'; font-weight:600; font-size:13px;
    letter-spacing:1px; text-transform:uppercase;
    border-bottom:3px solid transparent;
  }
  .navbtn.active{ color:#F4F2EB; border-bottom-color:var(--gold); }

  .section-title{
    font-family:'Big Shoulders Display'; font-weight:800;
    font-size:13px; letter-spacing:2px; text-transform:uppercase;
    color:var(--ink-soft); margin:22px 0 10px;
  }
  .section-title:first-child{ margin-top:4px; }

  .btn{
    font-family:'Work Sans'; font-weight:600; font-size:14px;
    border:none; border-radius:10px; cursor:pointer;
    padding:13px 18px;
  }
  .btn-primary{ background:var(--ink); color:#F4F2EB; width:100%; }
  .btn-primary:active{ background:#000; }
  .btn-ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--line-strong); }
  .btn-ghost:active{ background:var(--surface); }
  .btn-block{ width:100%; }
  .btn-danger{ background:transparent; color:var(--red-deep); border:1.5px solid rgba(184,57,44,0.35); }

  .chiprow{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    display:flex; align-items:center; gap:7px;
    background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:9px 14px 9px 10px;
    font-weight:600; font-size:14px; cursor:pointer;
  }
  .chip.selected{ background:var(--ink); color:#F4F2EB; border-color:var(--ink); }
  .typetag{
    width:18px; height:18px; border-radius:5px;
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono'; font-weight:700; font-size:10px;
    color:#fff; flex:none;
  }
  .typetag.strength{ background:var(--red); }
  .typetag.cardio{ background:var(--blue); }
  .typetag.bodyweight{ background:#3A7A4A; }

  .card{
    background:var(--surface); border-radius:var(--radius);
    padding:16px; margin-bottom:12px; border:1px solid var(--line);
  }
  .empty{
    text-align:center; padding:40px 16px; color:var(--ink-soft);
  }
  .empty .big{
    font-family:'Big Shoulders Display'; font-weight:800; font-size:22px;
    color:var(--ink); margin-bottom:6px;
  }

  /* Plate loader */
  .plate-loader{ margin:14px 0 6px; }
  .plate-readout{
    display:flex; align-items:baseline; gap:8px; margin-bottom:10px;
  }
  .plate-readout input{
    font-family:'JetBrains Mono'; font-weight:700; font-size:30px;
    width:120px; background:transparent; border:none; border-bottom:2px solid var(--line-strong);
    color:var(--ink); padding:0 2px 2px;
  }
  .plate-readout .unit{ font-size:13px; color:var(--ink-soft); font-weight:600; }
  .plates{ display:flex; gap:6px; flex-wrap:wrap; }
  .plate-btn{
    font-family:'JetBrains Mono'; font-weight:700;
    border:none; border-radius:50%; cursor:pointer; color:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .plate-btn[data-w="100"]{ width:54px; height:54px; font-size:15px; background:var(--red-deep);}
  .plate-btn[data-w="50"]{ width:48px; height:48px; font-size:14px; background:var(--red);}
  .plate-btn[data-w="25"]{ width:43px; height:43px; font-size:13px; background:#C46A41;}
  .plate-btn[data-w="10"]{ width:38px; height:38px; font-size:12px; background:var(--gold);}
  .plate-btn[data-w="5"]{ width:34px; height:34px; font-size:11px; background:#8C7A3E;}
  .plate-reset{
    width:54px; height:54px; border-radius:50%; border:1.5px dashed var(--line-strong);
    background:none; color:var(--ink-soft); font-size:11px; font-weight:600; cursor:pointer;
  }

  .field{ margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; font-weight:600; letter-spacing:0.5px;
    color:var(--ink-soft); text-transform:uppercase; margin-bottom:6px;
  }
  .field input[type=text], .field input[type=number], .field select{
    width:100%; padding:11px 12px; border-radius:10px;
    border:1.5px solid var(--line-strong); background:#fff;
    font-family:'Work Sans'; font-size:15px; color:var(--ink);
  }
  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{
    width:42px; height:42px; border-radius:50%; border:1.5px solid var(--line-strong);
    background:#fff; font-size:20px; font-weight:700; color:var(--ink); cursor:pointer;
  }
  .stepper input{
    font-family:'JetBrains Mono'; font-weight:700; font-size:24px;
    width:60px; text-align:center; border:none; background:transparent; color:var(--ink);
  }
  .row2{ display:flex; gap:10px; }
  .row2 .field{ flex:1; }

  .pace-readout{
    font-family:'JetBrains Mono'; font-weight:600; font-size:14px;
    color:var(--blue-deep); margin-top:-4px; margin-bottom:14px;
  }

  /* PR plate badge */
  .pr-badge{
    display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
    width:84px; height:84px; border-radius:50%;
    border:5px solid var(--gold);
    background:repeating-radial-gradient(circle, rgba(33,31,27,0.05) 0 2px, transparent 2px 7px), #fff;
    flex:none;
  }
  .pr-badge .val{ font-family:'JetBrains Mono'; font-weight:700; font-size:17px; line-height:1.1; }
  .pr-badge .lbl{ font-size:9px; letter-spacing:1px; color:var(--ink-soft); font-weight:700; text-transform:uppercase; }

  .session-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; border-bottom:1px solid var(--line);
  }
  .session-row:last-child{ border-bottom:none; }
  .session-left{ display:flex; align-items:center; gap:10px; }
  .session-name{ font-weight:600; font-size:15px; }
  .session-meta{ font-family:'JetBrains Mono'; font-size:13px; color:var(--ink-soft); }
  .session-time{ font-size:11px; color:var(--ink-faint); }
  .delbtn{ background:none; border:none; color:var(--ink-faint); font-size:18px; cursor:pointer; padding:6px; }

  .exercise-card{
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer;
  }
  .exercise-card .ex-name{ font-weight:700; font-size:16px; margin-bottom:2px; }
  .exercise-card .ex-sub{ font-size:12px; color:var(--ink-soft); }
  .chev{ color:var(--ink-faint); font-size:18px; }

  .detail-header{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .backbtn{ background:none; border:none; font-size:22px; color:var(--ink); cursor:pointer; padding:2px 6px 2px 0; }
  .detail-title{ font-family:'Big Shoulders Display'; font-weight:800; font-size:26px; }

  .pr-row{ display:flex; gap:14px; align-items:center; margin-bottom:18px; }
  .pr-text .val{ font-family:'JetBrains Mono'; font-weight:700; font-size:16px; }
  .pr-text .lbl{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:1px; }

  .chart-wrap{ background:#fff; border-radius:var(--radius); padding:14px 10px 4px; margin-bottom:16px; border:1px solid var(--line); }
  .chart-note{ font-size:11px; color:var(--ink-faint); text-align:center; margin:-6px 0 8px; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(33,31,27,0.45);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
  }
  .modal{
    background:var(--bg); width:100%; max-width:480px;
    border-radius:20px 20px 0 0; padding:22px 18px calc(22px + env(safe-area-inset-bottom,0px));
    max-height:85vh; overflow-y:auto;
  }
  .modal h2{ font-family:'Big Shoulders Display'; font-size:22px; margin:0 0 16px; }
  .radio-group{ display:flex; gap:10px; margin-bottom:14px; }
  .radio-opt{
    flex:1; text-align:center; padding:12px; border-radius:10px;
    border:1.5px solid var(--line-strong); cursor:pointer; font-weight:600;
  }
  .radio-opt.selected{ background:var(--ink); color:#F4F2EB; border-color:var(--ink); }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .modal-actions .btn{ flex:1; }

  textarea{
    width:100%; min-height:110px; border-radius:10px; border:1.5px solid var(--line-strong);
    font-family:'JetBrains Mono'; font-size:12px; padding:10px;
  }
  .settings-note{ font-size:12px; color:var(--ink-soft); margin-bottom:14px; line-height:1.5; }
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#F4F2EB; padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:600; z-index:60; opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .toast.show{ opacity:1; }

  .star-btn{
    background:none; border:none; cursor:pointer; font-size:16px;
    color:var(--gold); padding:2px 2px; line-height:1; flex:none;
  }
  .star-btn.off{ color:var(--ink-faint); }
  .linklike{
    background:none; border:none; color:var(--ink-soft); font-size:11px;
    font-weight:700; letter-spacing:1px; text-transform:uppercase;
    text-decoration:underline; cursor:pointer; padding:0;
  }
  .row-between{ display:flex; align-items:baseline; justify-content:space-between; }
  .chip.routine{ border-color:var(--gold); }
  .chip.routine.selected{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .summary-grid{ display:flex; gap:10px; margin-bottom:12px; }
  .summary-col{ flex:1; background:#fff; border-radius:10px; padding:12px; border:1px solid var(--line); }
  .summary-period{
    font-size:10px; text-transform:uppercase; letter-spacing:1px;
    color:var(--ink-soft); font-weight:700; margin-bottom:8px;
  }
  .summary-stat{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .summary-stat .k{ font-size:11px; color:var(--ink-soft); }
  .summary-stat .v{ font-family:'JetBrains Mono'; font-weight:700; font-size:13px; }
  .checklist{ display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
  .checkrow{
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border-radius:10px; border:1.5px solid var(--line-strong); cursor:pointer;
  }
  .checkrow.selected{ background:var(--surface); border-color:var(--ink); }
  .checkrow .box{
    width:18px; height:18px; border-radius:5px; border:1.5px solid var(--line-strong);
    flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff;
  }
  .checkrow.selected .box{ background:var(--ink); border-color:var(--ink); }
  .routine-mgmt-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; border-bottom:1px solid var(--line);
  }
  .routine-mgmt-row:last-child{ border-bottom:none; }
  .sync-dot{
    width:10px; height:10px; border-radius:50%; display:inline-block;
    background:var(--ink-faint); margin-right:2px; vertical-align:middle;
  }
  .sync-dot.ok{ background:#2A7A3B; }
  .sync-dot.syncing{ background:var(--gold); }
  .sync-dot.error{ background:var(--red); }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <h1 class="brand">RACK<small>workout log</small></h1>
    <div>
      <span class="sync-dot" id="syncDot" title="Sync status"></span>
      <button class="iconbtn" id="helpBtn" aria-label="How to use this app">?</button>
      <button class="iconbtn" id="settingsBtn" aria-label="Settings">&#9881;</button>
    </div>
  </header>
  <main id="main"></main>
  <nav class="bottomnav">
    <button class="navbtn" data-tab="log">Log</button>
    <button class="navbtn" data-tab="progress">Progress</button>
    <button class="navbtn" data-tab="body">Body</button>
  </nav>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------- state ---------- */
  var LS_KEY = "rack_v1_data";
  var state = { exercises: [], entries: [], routines: [], bodyWeights: [] };
  var view = { tab: "log", detailId: null };
  var selectedExerciseId = null;
  var activeRoutineFilter = null;
  var chartInstance = null;

  function loadState(){
    try{
      var raw = localStorage.getItem(LS_KEY);
      if(raw) state = JSON.parse(raw);
    }catch(e){ console.warn("Could not load data", e); }
    if(!state.exercises) state.exercises = [];
    if(!state.entries) state.entries = [];
    if(!state.routines) state.routines = [];
    if(!state.bodyWeights) state.bodyWeights = [];
  }
  function saveState(){
    state.updatedAt = Date.now();
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch(e){ console.warn("Could not save data", e); }
    schedulePush();
  }

  /* ---------- cloud sync (Supabase) ---------- */
  var SUPA_URL = "https://ctxnyfgdiugzhskumqpm.supabase.co";
  var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0eG55ZmdkaXVnemhza3VtcXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxODUxNzgsImV4cCI6MjA5ODc2MTE3OH0.waXx4gHFKwRJWNloGRhIpe7TH5UVn1N_jPLgaAn2oEY";
  var SYNC_KEY = "rack_v1_sync";
  var syncCode = null;
  var pushTimer = null;
  var pollTimer = null;
  var pendingPush = false;

  function loadSyncConfig(){
    try{
      var raw = localStorage.getItem(SYNC_KEY);
      if(raw) syncCode = JSON.parse(raw).code || null;
    }catch(e){}
  }
  function saveSyncConfig(){
    try{ localStorage.setItem(SYNC_KEY, JSON.stringify({code: syncCode})); }catch(e){}
  }
  function setSyncDot(status){
    var dot = document.getElementById("syncDot");
    if(!dot) return;
    dot.className = "sync-dot" + (status ? " "+status : "");
    dot.title = !syncCode ? "Sync off" :
      status==="ok" ? "Synced" :
      status==="syncing" ? "Syncing\u2026" :
      status==="error" ? "Sync error \u2014 will retry" : "Sync off";
  }
  function supaHeaders(){
    return {
      "apikey": SUPA_KEY,
      "Authorization": "Bearer "+SUPA_KEY,
      "Content-Type": "application/json"
    };
  }
  function schedulePush(){
    if(!syncCode) return;
    if(pushTimer) clearTimeout(pushTimer);
    setSyncDot("syncing");
    pushTimer = setTimeout(pushToCloud, 1200);
  }
  function pushToCloud(){
    if(!syncCode) return;
    setSyncDot("syncing");
    fetch(SUPA_URL+"/rest/v1/rack_sync?on_conflict=sync_code", {
      method: "POST",
      headers: Object.assign(supaHeaders(), {"Prefer":"resolution=merge-duplicates"}),
      body: JSON.stringify([{ sync_code: syncCode, data: state, updated_at: new Date().toISOString() }])
    }).then(function(res){
      pendingPush = !res.ok;
      setSyncDot(res.ok ? "ok" : "error");
    }).catch(function(){ pendingPush = true; setSyncDot("error"); });
  }
  function pullFromCloud(showToastOnUpdate){
    if(!syncCode) return Promise.resolve(false);
    setSyncDot("syncing");
    return fetch(SUPA_URL+"/rest/v1/rack_sync?sync_code=eq."+encodeURIComponent(syncCode)+"&select=data", {
      headers: supaHeaders()
    }).then(function(res){
      if(!res.ok) throw new Error("pull failed");
      return res.json();
    }).then(function(rows){
      setSyncDot("ok");
      if(rows.length && rows[0].data){
        var remote = rows[0].data;
        if((remote.updatedAt||0) > (state.updatedAt||0)){
          if(!remote.routines) remote.routines = [];
          if(!remote.bodyWeights) remote.bodyWeights = [];
          state = remote;
          try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
          renderApp();
          if(showToastOnUpdate) showToast("Synced from cloud");
          return true;
        }
      }
      return false;
    }).catch(function(){ setSyncDot("error"); return false; });
  }
  function startPolling(){
    if(pollTimer) clearInterval(pollTimer);
    if(!syncCode) return;
    pollTimer = setInterval(function(){
      if(pendingPush) pushToCloud(); else pullFromCloud(false);
    }, 30000);
  }
  function connectSync(code){
    syncCode = code;
    pendingPush = false;
    saveSyncConfig();
    pullFromCloud(true).then(function(adopted){
      if(!adopted) pushToCloud();
    });
    startPolling();
  }
  function disconnectSync(){
    syncCode = null;
    saveSyncConfig();
    if(pollTimer) clearInterval(pollTimer);
    if(pushTimer) clearTimeout(pushTimer);
    setSyncDot(null);
  }
  function generateSyncCode(){
    var words = ["iron","chalk","plate","rep","lift","press","squat","bench","grip","rack"];
    var w = words[Math.floor(Math.random()*words.length)];
    return w+"-"+Math.random().toString(36).slice(2,8);
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function dateLabel(iso){
    var parts = iso.split("-");
    var d = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[d.getMonth()]+" "+d.getDate();
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); }, 1600);
  }

  /* ---------- data helpers ---------- */
  function getExercise(id){ return state.exercises.find(function(e){ return e.id===id; }); }
  function exerciseEntries(id){
    return state.entries.filter(function(e){ return e.exerciseId===id; })
      .sort(function(a,b){ return a.date===b.date ? a.createdAt-b.createdAt : a.date.localeCompare(b.date); });
  }
  function lastEntryFor(id){
    var list = exerciseEntries(id);
    return list.length ? list[list.length-1] : null;
  }
  function strengthPR(id){
    var list = exerciseEntries(id);
    if(!list.length) return null;
    var best = list[0];
    list.forEach(function(e){
      if(e.weight > best.weight || (e.weight===best.weight && e.reps > best.reps)) best = e;
    });
    return best;
  }
  function cardioPR(id){
    var list = exerciseEntries(id);
    if(!list.length) return null;
    var bestPaceEntry = null, bestPaceVal = Infinity;
    var bestDistEntry = null, bestDistVal = -Infinity;
    list.forEach(function(e){
      var totalSec = (e.minutes||0)*60 + (e.seconds||0);
      var dist = e.distance || 0.0001;
      var pace = totalSec / dist;
      if(pace < bestPaceVal && totalSec > 0){ bestPaceVal = pace; bestPaceEntry = e; }
      if(e.distance > bestDistVal){ bestDistVal = e.distance; bestDistEntry = e; }
    });
    return { pace: bestPaceEntry, paceVal: bestPaceVal, distance: bestDistEntry };
  }
  function formatPace(secPerUnit, unit){
    if(!isFinite(secPerUnit)) return "—";
    var m = Math.floor(secPerUnit/60), s = Math.round(secPerUnit%60);
    if(s===60){ m+=1; s=0; }
    return m+":"+pad(s)+" /"+unit;
  }
  function bodyweightPR(id){
    var list = exerciseEntries(id);
    if(!list.length) return null;
    return list.reduce(function(best,e){ return e.reps>best.reps ? e : best; }, list[0]);
  }
  function typeLabel(type){ return type==="strength"?"S":type==="cardio"?"C":"B"; }
  function formatDuration(min,sec){ return min+":"+pad(sec); }
  function todaysEntries(){
    var t = todayISO();
    return state.entries.filter(function(e){ return e.date===t; })
      .sort(function(a,b){ return b.createdAt - a.createdAt; });
  }

  function sortedExercises(){
    return state.exercises.slice().sort(function(a,b){
      var fa = a.favorite?1:0, fb = b.favorite?1:0;
      if(fa!==fb) return fb-fa;
      var la = lastEntryFor(a.id), lb = lastEntryFor(b.id);
      var ta = la ? la.createdAt : 0, tb = lb ? lb.createdAt : 0;
      return tb-ta;
    });
  }
  function toggleFavorite(exId){
    var ex = getExercise(exId);
    if(!ex) return;
    ex.favorite = !ex.favorite;
    saveState();
    renderApp();
  }
  function entryVolume(e){ return (e.weight||0)*(e.reps||0); }
  function exerciseLifetimeVolume(exId){
    var ex = getExercise(exId);
    if(!ex || ex.type!=="strength") return 0;
    return exerciseEntries(exId).reduce(function(sum,e){ return sum+entryVolume(e); }, 0);
  }
  function todaysVolume(){
    return todaysEntries().reduce(function(sum,e){
      var ex = getExercise(e.exerciseId);
      return (ex && ex.type==="strength") ? sum+entryVolume(e) : sum;
    }, 0);
  }
  function isoFromDate(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function startOfWeekISO(){
    var d = new Date();
    var day = d.getDay();
    var diff = (day===0 ? -6 : 1-day);
    d.setDate(d.getDate()+diff);
    return isoFromDate(d);
  }
  function startOfMonthISO(){
    var d = new Date();
    d.setDate(1);
    return isoFromDate(d);
  }
  function summaryFor(startISO){
    var entries = state.entries.filter(function(e){ return e.date>=startISO; });
    var days = {};
    var volume = 0, distMi = 0, distKm = 0;
    entries.forEach(function(e){
      days[e.date] = true;
      var ex = getExercise(e.exerciseId);
      if(!ex) return;
      if(ex.type==="strength") volume += entryVolume(e);
      else {
        var u = ex.distanceUnit||"mi";
        if(u==="km") distKm += (e.distance||0); else distMi += (e.distance||0);
      }
    });
    return { sessions: Object.keys(days).length, volume: volume, distMi: distMi, distKm: distKm };
  }
  function formatDistanceSummary(s){
    var parts = [];
    if(s.distMi>0) parts.push((Math.round(s.distMi*10)/10)+" mi");
    if(s.distKm>0) parts.push((Math.round(s.distKm*10)/10)+" km");
    return parts.length ? parts.join(" + ") : "—";
  }

  function bodyWeightSorted(){
    return state.bodyWeights.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  }
  function bodyWeightChangeSince(days){
    var list = bodyWeightSorted();
    if(list.length<2) return null;
    var latest = list[list.length-1];
    var target = new Date();
    target.setDate(target.getDate()-days);
    var targetISO = isoFromDate(target);
    var candidate = null;
    for(var i=0;i<list.length;i++){ if(list[i].date<=targetISO) candidate = list[i]; }
    if(!candidate) candidate = list[0];
    if(candidate.id===latest.id) return null;
    return { latest: latest, from: candidate, diff: latest.weight - candidate.weight };
  }

  /* ---------- rendering: shell ---------- */
  function renderApp(){
    document.querySelectorAll(".navbtn").forEach(function(btn){
      btn.classList.toggle("active", btn.dataset.tab===view.tab);
    });
    var main = document.getElementById("main");
    if(view.tab==="log"){
      main.innerHTML = renderLogTab();
      wireLogTab();
    } else if(view.tab==="body"){
      main.innerHTML = renderBodyTab();
      wireBodyTab();
    } else {
      if(view.detailId){
        main.innerHTML = renderDetail(view.detailId);
        wireDetail(view.detailId);
      } else {
        main.innerHTML = renderProgressTab();
        wireProgressTab();
      }
    }
  }

  /* ---------- LOG TAB ---------- */
  function renderLogTab(){
    var html = "";

    html += '<div class="row-between section-title" style="margin-top:4px;">' +
      '<span>Routines</span><button class="linklike" id="manageRoutinesBtn">Manage</button></div>';
    if(!state.routines.length){
      html += '<div style="font-size:13px;color:var(--ink-soft);margin-bottom:6px;">No routines yet — tap Manage to group exercises like "Leg day."</div>';
    } else {
      html += '<div class="chiprow" id="routineChips">';
      state.routines.forEach(function(r){
        var sel = r.id===activeRoutineFilter ? " selected" : "";
        html += '<div class="chip routine'+sel+'" data-routine="'+r.id+'">'+escapeHtml(r.name)+'</div>';
      });
      html += '</div>';
    }

    html += '<div class="section-title">Pick an exercise</div>';
    if(!state.exercises.length){
      html += '<div class="empty"><div class="big">No exercises yet</div>' +
        'Add your treadmill, chest press, or whatever you start with today.</div>' +
        '<button class="btn btn-primary" id="addExBtnEmpty">+ Add your first exercise</button>';
      return html;
    }
    var list = sortedExercises();
    if(activeRoutineFilter){
      var r = state.routines.find(function(rt){ return rt.id===activeRoutineFilter; });
      if(r) list = list.filter(function(ex){ return r.exerciseIds.indexOf(ex.id)!==-1; });
    }
    html += '<div class="chiprow" id="exChips">';
    list.forEach(function(ex){
      var sel = ex.id===selectedExerciseId ? " selected" : "";
      html += '<div class="chip'+sel+'" data-id="'+ex.id+'">' +
        '<button class="star-btn'+(ex.favorite?'':' off')+'" data-fav="'+ex.id+'">'+(ex.favorite?'\u2605':'\u2606')+'</button>' +
        '<span class="typetag '+ex.type+'">'+typeLabel(ex.type)+'</span>' +
        escapeHtml(ex.name)+'</div>';
    });
    html += '</div>';
    html += '<button class="btn btn-ghost" id="addExBtn" style="margin-top:12px;width:100%;">+ Add new exercise</button>';

    if(selectedExerciseId){
      var ex = getExercise(selectedExerciseId);
      if(ex){
        html += '<div class="section-title">Log a set</div>';
        html += '<div class="card">' + (ex.type==="strength" ? renderStrengthLogger(ex) : ex.type==="cardio" ? renderCardioLogger(ex) : renderBodyweightLogger(ex)) + '</div>';
      }
    }

    html += '<div class="section-title">Today</div>';
    var todays = todaysEntries();
    if(!todays.length){
      html += '<div class="empty" style="padding:24px 16px;">Nothing logged yet today.</div>';
    } else {
      var vol = todaysVolume();
      if(vol>0) html += '<div style="font-size:12px;color:var(--ink-soft);margin:-4px 0 8px;">Volume so far: '+Math.round(vol).toLocaleString()+' lb</div>';
      html += '<div class="card" style="padding:4px 16px;">';
      todays.forEach(function(e){
        var ex = getExercise(e.exerciseId);
        if(!ex) return;
        html += renderSessionRow(e, ex);
      });
      html += '</div>';
    }
    return html;
  }

  function renderStrengthLogger(ex){
    var last = lastEntryFor(ex.id);
    var w = last ? last.weight : 0;
    var r = last ? last.reps : 8;
    var pr = strengthPR(ex.id);
    var html = "";
    if(pr) html += '<div class="pace-readout" style="color:var(--red-deep);">PR: '+pr.weight+' lb &times; '+pr.reps+'</div>';
    html += '<div class="plate-loader">' +
      '<div class="plate-readout"><input type="number" id="weightInput" value="'+w+'" step="0.5"><span class="unit">lb</span></div>' +
      '<div class="plates">' +
        [100,50,25,10,5].map(function(p){ return '<button class="plate-btn" data-w="'+p+'">'+p+'</button>'; }).join("") +
        '<button class="plate-reset" data-w="reset">CLR</button>' +
      '</div>' +
    '</div>';
    html += '<div class="field" style="margin-top:16px;"><label>Reps</label>' +
      '<div class="stepper"><button data-step="-1">&minus;</button>' +
      '<input type="number" id="repsInput" value="'+r+'">' +
      '<button data-step="1">&plus;</button></div></div>';
    html += '<button class="btn btn-primary" id="logSetBtn">Log set</button>';
    return html;
  }

  function renderBodyweightLogger(ex){
    var last = lastEntryFor(ex.id);
    var r = last ? last.reps : 10;
    var pr = bodyweightPR(ex.id);
    var html = "";
    if(pr) html += '<div class="pace-readout" style="color:#3A7A4A;">PR: '+pr.reps+' reps</div>';
    html += '<div class="field" style="margin-top:4px;"><label>Reps</label>' +
      '<div class="stepper"><button data-step="-1">&minus;</button>' +
      '<input type="number" id="repsInput" value="'+r+'">' +
      '<button data-step="1">&plus;</button></div></div>';
    html += '<button class="btn btn-primary" id="logBwSetBtn">Log set</button>';
    return html;
  }

  function renderCardioLogger(ex){
    var last = lastEntryFor(ex.id);
    var min = last ? last.minutes : 20;
    var sec = last ? last.seconds : 0;
    var dist = last ? last.distance : 2;
    var unit = ex.distanceUnit || "mi";
    var pr = cardioPR(ex.id);
    var html = "";
    if(pr && pr.pace) html += '<div class="pace-readout">Best pace: '+formatPace(pr.paceVal, unit)+'</div>';
    html += '<div class="row2">' +
      '<div class="field"><label>Distance ('+unit+')</label><input type="number" id="distInput" value="'+dist+'" step="0.01"></div>' +
      '<div class="field"><label>Minutes</label><input type="number" id="minInput" value="'+min+'" step="1"></div>' +
      '<div class="field"><label>Seconds</label><input type="number" id="secInput" value="'+sec+'" step="1"></div>' +
    '</div>';
    html += '<div class="pace-readout" id="livePace">Pace: —</div>';
    html += '<button class="btn btn-primary" id="logCardioBtn">Log session</button>';
    return html;
  }

  function renderSessionRow(e, ex){
    var meta, t = new Date(e.createdAt);
    var timeStr = pad(t.getHours()%12===0?12:t.getHours()%12)+":"+pad(t.getMinutes());
    if(ex.type==="strength"){
      meta = e.weight+' lb &times; '+e.reps;
    } else if(ex.type==="bodyweight"){
      meta = e.reps+' reps';
    } else {
      meta = e.distance+' '+(ex.distanceUnit||'mi')+' in '+formatDuration(e.minutes,e.seconds);
    }
    return '<div class="session-row" data-entry="'+e.id+'">' +
      '<div class="session-left"><span class="typetag '+ex.type+'">'+typeLabel(ex.type)+'</span>' +
      '<div><div class="session-name">'+escapeHtml(ex.name)+'</div>' +
      '<div class="session-meta">'+meta+' <span class="session-time">&middot; '+timeStr+'</span></div></div></div>' +
      '<div style="display:flex;align-items:center;">' +
      '<button class="iconbtn" data-edit="'+e.id+'" style="font-size:14px;padding:6px;">&#9998;</button>' +
      '<button class="delbtn" data-del="'+e.id+'">&times;</button></div></div>';
  }

  function wireLogTab(){
    var manageBtn = document.getElementById("manageRoutinesBtn");
    if(manageBtn) manageBtn.onclick = openManageRoutinesModal;

    var routineChips = document.getElementById("routineChips");
    if(routineChips){
      routineChips.querySelectorAll(".chip").forEach(function(chip){
        chip.onclick = function(){
          activeRoutineFilter = chip.dataset.routine===activeRoutineFilter ? null : chip.dataset.routine;
          renderApp();
        };
      });
    }

    var addBtn = document.getElementById("addExBtn");
    var addBtnEmpty = document.getElementById("addExBtnEmpty");
    if(addBtn) addBtn.onclick = openAddExerciseModal;
    if(addBtnEmpty) addBtnEmpty.onclick = openAddExerciseModal;

    var chips = document.getElementById("exChips");
    if(chips){
      chips.querySelectorAll(".chip").forEach(function(chip){
        chip.onclick = function(){
          selectedExerciseId = chip.dataset.id===selectedExerciseId ? null : chip.dataset.id;
          renderApp();
        };
      });
      chips.querySelectorAll("[data-fav]").forEach(function(star){
        star.onclick = function(e){
          e.stopPropagation();
          toggleFavorite(star.dataset.fav);
        };
      });
    }

    var logBwSetBtn = document.getElementById("logBwSetBtn");
    if(logBwSetBtn){
      document.querySelectorAll("[data-step]").forEach(function(btn){
        btn.onclick = function(){
          var repsInput = document.getElementById("repsInput");
          var cur = parseInt(repsInput.value)||0;
          repsInput.value = Math.max(0, cur + parseInt(btn.dataset.step));
        };
      });
      logBwSetBtn.onclick = function(){
        var reps = parseInt(document.getElementById("repsInput").value)||0;
        if(reps<=0){ showToast("Add at least 1 rep"); return; }
        state.entries.push({
          id: uid(), exerciseId: selectedExerciseId, date: todayISO(),
          reps: reps, createdAt: Date.now()
        });
        saveState();
        showToast("Set logged");
        renderApp();
      };
    }

    var weightInput = document.getElementById("weightInput");
    if(weightInput){
      document.querySelectorAll(".plate-btn").forEach(function(btn){
        btn.onclick = function(){
          if(btn.dataset.w==="reset"){ weightInput.value = 0; return; }
          var cur = parseFloat(weightInput.value)||0;
          weightInput.value = Math.round((cur + parseFloat(btn.dataset.w))*2)/2;
        };
      });
      document.querySelectorAll("[data-step]").forEach(function(btn){
        btn.onclick = function(){
          var repsInput = document.getElementById("repsInput");
          var cur = parseInt(repsInput.value)||0;
          repsInput.value = Math.max(0, cur + parseInt(btn.dataset.step));
        };
      });
      document.getElementById("logSetBtn").onclick = function(){
        var weight = parseFloat(document.getElementById("weightInput").value)||0;
        var reps = parseInt(document.getElementById("repsInput").value)||0;
        if(reps<=0){ showToast("Add at least 1 rep"); return; }
        state.entries.push({
          id: uid(), exerciseId: selectedExerciseId, date: todayISO(),
          weight: weight, reps: reps, createdAt: Date.now()
        });
        saveState();
        showToast("Set logged");
        renderApp();
      };
    }

    var distInput = document.getElementById("distInput");
    if(distInput){
      function updatePace(){
        var d = parseFloat(distInput.value)||0;
        var m = parseInt(document.getElementById("minInput").value)||0;
        var s = parseInt(document.getElementById("secInput").value)||0;
        var unit = (getExercise(selectedExerciseId)||{}).distanceUnit || "mi";
        var totalSec = m*60+s;
        var el = document.getElementById("livePace");
        el.textContent = d>0 && totalSec>0 ? "Pace: "+formatPace(totalSec/d, unit) : "Pace: —";
      }
      ["distInput","minInput","secInput"].forEach(function(id){
        document.getElementById(id).addEventListener("input", updatePace);
      });
      document.getElementById("logCardioBtn").onclick = function(){
        var d = parseFloat(distInput.value)||0;
        var m = parseInt(document.getElementById("minInput").value)||0;
        var s = parseInt(document.getElementById("secInput").value)||0;
        if(d<=0 || (m===0 && s===0)){ showToast("Add distance and time"); return; }
        state.entries.push({
          id: uid(), exerciseId: selectedExerciseId, date: todayISO(),
          distance: d, minutes: m, seconds: s, createdAt: Date.now()
        });
        saveState();
        showToast("Session logged");
        renderApp();
      };
    }

    document.querySelectorAll("[data-del]").forEach(function(btn){
      btn.onclick = function(){
        state.entries = state.entries.filter(function(e){ return e.id!==btn.dataset.del; });
        saveState();
        renderApp();
      };
    });
    wireEditButtons();
  }

  /* ---------- PROGRESS TAB ---------- */

    var wk = summaryFor(startOfWeekISO());
    var mo = summaryFor(startOfMonthISO());
    html += '<div class="section-title" style="margin-top:4px;">This week &amp; month</div>';
    html += '<div class="summary-grid">' +
      '<div class="summary-col"><div class="summary-period">This week</div>' +
        '<div class="summary-stat"><span class="k">Sessions</span><span class="v">'+wk.sessions+'</span></div>' +
        '<div class="summary-stat"><span class="k">Volume</span><span class="v">'+Math.round(wk.volume).toLocaleString()+' lb</span></div>' +
        '<div class="summary-stat"><span class="k">Cardio</span><span class="v">'+formatDistanceSummary(wk)+'</span></div>' +
      '</div>' +
      '<div class="summary-col"><div class="summary-period">This month</div>' +
        '<div class="summary-stat"><span class="k">Sessions</span><span class="v">'+mo.sessions+'</span></div>' +
        '<div class="summary-stat"><span class="k">Volume</span><span class="v">'+Math.round(mo.volume).toLocaleString()+' lb</span></div>' +

        '<div style="display:flex;align-items:center;gap:4px;">' +

  function wireProgressTab(){
    document.querySelectorAll("[data-ex]").forEach(function(card){
      card.onclick = function(){

        renderApp();

  /* ---------- DETAIL VIEW ---------- */
  function renderDetail(exId){
    var ex = getExercise(exId);
    if(!ex){ view.detailId = null; return renderProgressTab(); }
    var entries = exerciseEntries(exId);
    var html = '<div class="detail-header"><button class="backbtn" id="backBtn">&larr;</button>' +
      '<div class="detail-title" style="flex:1;">'+escapeHtml(ex.name)+'</div>' +
      '<button class="iconbtn" id="renameBtn" style="font-size:17px;" aria-label="Rename">&#9998;</button></div>';

    if(ex.type==="strength"){
      var pr = strengthPR(exId);
      html += '<div class="pr-row">' +
        '<div class="pr-badge" style="border-color:var(--gold);"><span class="val">'+(pr?pr.weight:"—")+'</span><span class="lbl">lb PR</span></div>' +
        '<div class="pr-text">' + (pr ? '<div class="val">'+pr.weight+' lb &times; '+pr.reps+'</div><div class="lbl">'+dateLabel(pr.date)+'</div>' : '<div class="lbl">No PR yet</div>') + '</div>' +
      '</div>';
      var lifeVol = exerciseLifetimeVolume(exId);
      if(lifeVol>0) html += '<div style="font-size:12px;color:var(--ink-soft);margin:-10px 0 16px;">Lifetime volume: '+Math.round(lifeVol).toLocaleString()+' lb</div>';
    } else if(ex.type==="bodyweight"){
      var bpr = bodyweightPR(exId);
      html += '<div class="pr-row">' +
        '<div class="pr-badge" style="border-color:#3A7A4A;"><span class="val">'+(bpr?bpr.reps:"—")+'</span><span class="lbl">rep PR</span></div>' +
        '<div class="pr-text">' + (bpr ? '<div class="val">'+bpr.reps+' reps</div><div class="lbl">'+dateLabel(bpr.date)+'</div>' : '<div class="lbl">No PR yet</div>') + '</div>' +
      '</div>';
    } else {
      var cpr = cardioPR(exId);
      var unit = ex.distanceUnit||"mi";
      html += '<div class="pr-row">' +
        '<div class="pr-badge" style="border-color:var(--blue);"><span class="val">'+(cpr&&cpr.pace?formatPace(cpr.paceVal,unit).split(" ")[0]:"—")+'</span><span class="lbl">best pace</span></div>' +
        '<div class="pr-text">' + (cpr && cpr.distance ? '<div class="val">Longest: '+cpr.distance.distance+' '+unit+'</div><div class="lbl">'+dateLabel(cpr.distance.date)+'</div>' : '<div class="lbl">No data yet</div>') + '</div>' +
      '</div>';
    }

    if(entries.length>=2){
      html += '<div class="chart-wrap"><canvas id="trendChart" height="160"></canvas></div>';
      if(ex.type==="cardio") html += '<div class="chart-note">Lower is faster — line trending up means you\'re getting quicker.</div>';
    }

    html += '<div class="section-title">History</div>';
    html += '<div class="card" style="padding:4px 16px;">';
    if(!entries.length){
      html += '<div class="empty" style="padding:20px 0;">No entries yet.</div>';
    } else {
      entries.slice().reverse().forEach(function(e){
        var meta;
        if(ex.type==="strength") meta = e.weight+' lb &times; '+e.reps;
        else if(ex.type==="bodyweight") meta = e.reps+' reps';
        else meta = e.distance+' '+(ex.distanceUnit||'mi')+' in '+formatDuration(e.minutes,e.seconds);
        html += '<div class="session-row" data-entry="'+e.id+'">' +
          '<div class="session-left"><div><div class="session-name">'+dateLabel(e.date)+'</div>' +
          '<div class="session-meta">'+meta+'</div></div></div>' +
          '<div style="display:flex;align-items:center;">' +
          '<button class="iconbtn" data-edit="'+e.id+'" style="font-size:14px;padding:6px;">&#9998;</button>' +
          '<button class="delbtn" data-del="'+e.id+'">&times;</button></div></div>';
      });
    }
    html += '</div>';

    html += '<div class="section-title">Manage</div>' +
      '<button class="btn btn-danger btn-block" id="deleteExBtn">Delete this exercise</button>';

    return html;
  }

  function wireDetail(exId){
    document.getElementById("backBtn").onclick = function(){ view.detailId = null; renderApp(); };
    document.getElementById("renameBtn").onclick = function(){ openRenameModal(exId); };
    wireEditButtons();
    document.querySelectorAll("[data-del]").forEach(function(btn){
      btn.onclick = function(){
        state.entries = state.entries.filter(function(e){ return e.id!==btn.dataset.del; });
        saveState();
        renderApp();
      };
    });
    document.getElementById("deleteExBtn").onclick = function(){
      openConfirm("Delete exercise?", "This removes \u201c"+escapeHtml(getExercise(exId).name)+"\u201d and all its logged history. This can't be undone.", "Delete", function(){
        state.exercises = state.exercises.filter(function(e){ return e.id!==exId; });
        state.entries = state.entries.filter(function(e){ return e.exerciseId!==exId; });
        saveState();
        view.detailId = null;
        renderApp();
      });
    };
    var canvas = document.getElementById("trendChart");
    if(canvas && window.Chart){
      var ex = getExercise(exId);
      var entries = exerciseEntries(exId);
      if(chartInstance){ chartInstance.destroy(); }
      if(ex.type==="strength"){
        var byDate = {};
        entries.forEach(function(e){ if(!byDate[e.date] || e.weight>byDate[e.date]) byDate[e.date]=e.weight; });
        var labels = Object.keys(byDate);
        chartInstance = new Chart(canvas, {
          type:"line",
          data:{ labels: labels.map(dateLabel), datasets:[{
            data: labels.map(function(d){return byDate[d];}),
            borderColor:"#B8392C", backgroundColor:"rgba(184,57,44,0.1)",
            tension:0.25, fill:true, pointRadius:3
          }]},
          options:{ plugins:{legend:{display:false}}, scales:{y:{title:{display:true,text:"lb"}}} }
        });
      } else if(ex.type==="bodyweight"){
        var byDateB = {};
        entries.forEach(function(e){ if(!byDateB[e.date] || e.reps>byDateB[e.date]) byDateB[e.date]=e.reps; });
        var labelsB = Object.keys(byDateB);
        chartInstance = new Chart(canvas, {
          type:"line",
          data:{ labels: labelsB.map(dateLabel), datasets:[{
            data: labelsB.map(function(d){return byDateB[d];}),
            borderColor:"#3A7A4A", backgroundColor:"rgba(58,122,74,0.1)",
            tension:0.25, fill:true, pointRadius:3
          }]},
          options:{ plugins:{legend:{display:false}}, scales:{y:{title:{display:true,text:"reps"}}} }
        });
      } else {
        var unit = ex.distanceUnit||"mi";
        var byDate2 = {};
        entries.forEach(function(e){
          var totalSec=(e.minutes||0)*60+(e.seconds||0);
          var pace = totalSec/(e.distance||0.0001);
          if(!byDate2[e.date] || pace<byDate2[e.date]) byDate2[e.date]=pace;
        });
        var labels2 = Object.keys(byDate2);
        chartInstance = new Chart(canvas, {
          type:"line",
          data:{ labels: labels2.map(dateLabel), datasets:[{
            data: labels2.map(function(d){return byDate2[d];}),
            borderColor:"#2B5980", backgroundColor:"rgba(43,89,128,0.1)",
            tension:0.25, fill:true, pointRadius:3
          }]},
          options:{ plugins:{legend:{display:false}},
            scales:{ y:{ reverse:true, ticks:{ callback:function(v){ return formatPace(v,unit); } } } } }
        });
      }
    }
  }

  function openRoutineEditorModal(routine){
    if(!state.exercises.length){
      openModal('<h2>New routine</h2><div class="settings-note">Add at least one exercise first, then come back to build a routine.</div>' +
        '<div class="modal-actions"><button class="btn btn-ghost" id="closeNewRoutine" style="flex:1;">Close</button></div>');
      document.getElementById("closeNewRoutine").onclick = closeModal;

    var isEdit = !!routine;
    var selected = {};
    if(isEdit) routine.exerciseIds.forEach(function(id){ selected[id] = true; });
    var html = '<h2>'+(isEdit?'Edit routine':'New routine')+'</h2>' +
      '<div class="field"><label>Name</label><input type="text" id="routineName" placeholder="e.g. Leg day" value="'+(isEdit?escapeHtml(routine.name):'')+'"></div>' +
      '<div class="field"><label>Exercises</label><div class="checklist" id="routineChecklist">' +
      sortedExercises().map(function(ex){
        var sel = selected[ex.id];
        return '<div class="checkrow'+(sel?' selected':'')+'" data-id="'+ex.id+'"><span class="box">'+(sel?'&#10003;':'')+'</span>' +
          '<span class="typetag '+ex.type+'">'+typeLabel(ex.type)+'</span>' +
          '<span>'+escapeHtml(ex.name)+'</span></div>';
      }).join('') +
      '</div></div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" id="cancelRoutine">Cancel</button>' +
        '<button class="btn btn-primary" id="saveRoutine">Save</button>' +
      '</div>';
    openModal(html);
    document.querySelectorAll("#routineChecklist .checkrow").forEach(function(row){
      row.onclick = function(){
        var id = row.dataset.id;
        if(selected[id]){ delete selected[id]; row.classList.remove("selected"); row.querySelector(".box").textContent=""; }
        else { selected[id] = true; row.classList.add("selected"); row.querySelector(".box").innerHTML="&#10003;"; }
      };
    });
    document.getElementById("cancelRoutine").onclick = closeModal;
    document.getElementById("saveRoutine").onclick = function(){
      var name = document.getElementById("routineName").value.trim();
      var ids = Object.keys(selected);
      if(!name){ showToast("Give it a name"); return; }
      if(!ids.length){ showToast("Pick at least one exercise"); return; }

        routine.name = name;
        routine.exerciseIds = ids;
      } else {
        state.routines.push({ id: uid(), name: name, exerciseIds: ids, createdAt: Date.now() });
      }
      saveState();
      closeModal();
      renderApp();
      showToast("Routine saved");
    };
  }

        '</div>' +

          (ch30 ? '<div style="font-size:12px;color:var(--ink-soft);">30d: <b style="color:'+(ch30.diff<0?'#2A7A3B':ch30.diff>0?'var(--red-deep)':'var(--ink-soft)')+';">'+(ch30.diff>0?'+':'')+ch30.diff.toFixed(1)+' lb</b></div>' : '') +
          (ch90 ? '<div style="font-size:12px;color:var(--ink-soft);">90d: <b style="color:'+(ch90.diff<0?'#2A7A3B':ch90.diff>0?'var(--red-deep)':'var(--ink-soft)')+';">'+(ch90.diff>0?'+':'')+ch90.diff.toFixed(1)+' lb</b></div>' : '') +
        '</div>' +
      '</div>';
    }

    html += '<div class="card" style="padding:14px;">' +
      '<div class="field" style="margin-bottom:8px;"><label>Log weight (lb)</label>' +
        '<div style="display:flex;gap:10px;align-items:center;">' +
          '<input type="number" id="bwInput" step="0.1" placeholder="e.g. 185.5" style="flex:1;padding:11px 12px;border-radius:10px;border:1.5px solid var(--line-strong);background:#fff;font-family:\'Work Sans\';font-size:15px;">' +
          '<button class="btn btn-primary" id="logBwBtn" style="width:auto;padding:11px 18px;">Log</button>' +
        '</div>' +
      '</div>' +
    '</div>';

    if(list.length>=2){
      html += '<div class="chart-wrap" style="margin-bottom:12px;"><canvas id="bwChart" height="160"></canvas></div>';

        html += '<div class="session-row">' +

      });
      html += '</div>';
    } else {
      html += '<div class="empty"><div class="big">No weigh-ins yet</div>Log your first weight above to start tracking.</div>';
    }
    return html;
  }

  function openSettingsModal(){
    var html = '<h2>Settings</h2>' +

      (syncCode
        ? '<div class="settings-note">Syncing with code: <b style="font-family:\'JetBrains Mono\';color:var(--ink);">'+escapeHtml(syncCode)+'</b><br>Use this code on another device to sync your data there. Keep it private \u2014 anyone with the code can see and change this data.</div>' +

          '<button class="btn btn-danger btn-block" id="disconnectSyncBtn" style="margin-bottom:18px;">Turn off sync</button>'
        : '<div class="settings-note">Sync your data across devices with a sync code. Enter the same code on each device. Treat it like a password \u2014 anyone with the code can see and change this data.</div>' +
          '<div class="field"><label>Sync code</label><input type="text" id="syncCodeInput" placeholder="e.g. iron-x7k2p9" autocapitalize="none" autocorrect="off"></div>' +
          '<div class="modal-actions" style="margin-bottom:18px;">' +
            '<button class="btn btn-ghost" id="genCodeBtn">Generate new</button>' +
            '<button class="btn btn-primary" id="connectSyncBtn">Connect</button>' +
          '</div>') +
      '<div class="section-title">Local data</div>' +
      '<div class="settings-note">Back up your data as a file you can re-import later, or on another device.</div>' +
      '<button class="btn btn-ghost btn-block" id="exportBtn" style="margin-bottom:10px;">Download backup (.json)</button>' +
      '<button class="btn btn-ghost btn-block" id="exportCsvBtn" style="margin-bottom:10px;">Export history (.csv)</button>' +
      '<div class="field"><label>Restore from backup</label>' +
        '<input type="file" id="importFile" accept="application/json,.json" style="display:none;">' +
        '<button class="btn btn-ghost btn-block" id="importBtn">Choose backup file&hellip;</button>' +
        '<div class="settings-note" id="importFileName" style="margin-top:8px;margin-bottom:0;"></div>' +
      '</div>' +
      '<button class="btn btn-danger btn-block" id="clearBtn">Erase all data</button>' +
      '<div class="modal-actions" style="margin-top:14px;"><button class="btn btn-ghost" id="closeSettings" style="flex:1;">Close</button></div>';
    openModal(html);
    document.getElementById("closeSettings").onclick = closeModal;
    var connectBtn = document.getElementById("connectSyncBtn");
    if(connectBtn){
      document.getElementById("genCodeBtn").onclick = function(){
        document.getElementById("syncCodeInput").value = generateSyncCode();
      };
      connectBtn.onclick = function(){
        var code = document.getElementById("syncCodeInput").value.trim().toLowerCase();
        if(code.length < 6){ showToast("Code must be at least 6 characters"); return; }
        connectSync(code);
        closeModal();
        showToast("Sync connected");
      };
    }
    var syncNowBtn = document.getElementById("syncNowBtn");
    if(syncNowBtn){
      syncNowBtn.onclick = function(){
        pullFromCloud(true).then(function(adopted){
          if(!adopted){ pushToCloud(); showToast("Up to date"); }
        });
      };
      document.getElementById("disconnectSyncBtn").onclick = function(){
        openConfirm("Turn off sync?", "Your data stays on this device, but changes will no longer sync to the cloud or other devices.", "Turn off", function(){
          disconnectSync();
          showToast("Sync turned off");
        });
      };
    }
    document.getElementById("exportBtn").onclick = function(){
      var blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "rack-backup-"+todayISO()+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
    document.getElementById("exportCsvBtn").onclick = function(){
      function csvCell(v){
        if(v===undefined || v===null) return "";
        var s = String(v);
        return (s.indexOf(",")!==-1 || s.indexOf('"')!==-1 || s.indexOf("\n")!==-1)
          ? '"'+s.replace(/"/g,'""')+'"' : s;
      }
      var rows = [["date","record","exercise","type","weight_lb","reps","distance","distance_unit","minutes","seconds"]];
      state.entries.slice().sort(function(a,b){ return a.date===b.date ? a.createdAt-b.createdAt : a.date.localeCompare(b.date); })
        .forEach(function(e){
          var ex = getExercise(e.exerciseId);
          if(!ex) return;
          rows.push([e.date, "workout", ex.name, ex.type,
            ex.type==="strength" ? e.weight : "",
            (ex.type==="strength"||ex.type==="bodyweight") ? e.reps : "",
            ex.type==="cardio" ? e.distance : "",
            ex.type==="cardio" ? (ex.distanceUnit||"mi") : "",
            ex.type==="cardio" ? e.minutes : "",
            ex.type==="cardio" ? e.seconds : ""]);
        });
      bodyWeightSorted().forEach(function(e){
        rows.push([e.date, "body_weight", "", "", e.weight, "", "", "", "", ""]);
      });
      var csv = rows.map(function(r){ return r.map(csvCell).join(","); }).join("\n");
      var blob = new Blob([csv], {type:"text/csv"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "rack-history-"+todayISO()+".csv";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
    document.getElementById("importBtn").onclick = function(){
      document.getElementById("importFile").click();
    };
    document.getElementById("importFile").addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      if(!file) return;
      document.getElementById("importFileName").textContent = "Reading "+file.name+"\u2026";
      var reader = new FileReader();
      reader.onload = function(evt){
        try{
          var parsed = JSON.parse(evt.target.result);
          if(!parsed.exercises || !parsed.entries) throw new Error("bad shape");
          if(!parsed.routines) parsed.routines = [];
          if(!parsed.bodyWeights) parsed.bodyWeights = [];
          state = parsed;
          saveState();
          closeModal();
          view = {tab:"log", detailId:null};
          selectedExerciseId = null;
          renderApp();
          showToast("Data restored");
        }catch(err){ showToast("That doesn't look like a valid backup"); }
      };
      reader.onerror = function(){ showToast("Couldn't read that file"); };
      reader.readAsText(file);
    });
    document.getElementById("clearBtn").onclick = function(){
      openConfirm("Erase all data?", "This deletes every exercise and logged set. This can't be undone.", "Erase everything", function(){
        state = {exercises:[], entries:[], routines:[], bodyWeights:[]};
        saveState();
        view = {tab:"log", detailId:null};
        selectedExerciseId = null;
        renderApp();
        showToast("All data erased");
      });
    };
  }

  /* ---------- init ---------- */
  document.querySelectorAll(".navbtn").forEach(function(btn){
    btn.addEventListener("click", function(){
      view.tab = btn.dataset.tab;
      view.detailId = null;
      renderApp();
    });
  });
  document.getElementById("settingsBtn").addEventListener("click", openSettingsModal);
  document.getElementById("helpBtn").addEventListener("click", openHelpModal);

  loadState();
  loadSyncConfig();
  renderApp();
  if(syncCode){
    setSyncDot("syncing");
    pullFromCloud(false);
    startPolling();
  } else {
    setSyncDot(null);
  }
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState==="visible" && syncCode){
      if(pendingPush) pushToCloud(); else pullFromCloud(false);
    }
  });
  window.addEventListener("online", function(){
    if(syncCode && pendingPush) pushToCloud();
  });
})();
</script>
</body>
</html>
